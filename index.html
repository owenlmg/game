<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>单词保卫战-可视优化版</title>
    <style>
        :root { --primary: #4ecca3; --accent: #ff4757; --bg: #0a0a12; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            position: fixed; width: 100%; height: 100%; overflow: hidden; 
            margin: 0; padding: 0; background: var(--bg); color: white;
            display: flex; flex-direction: column;
        }

        .header { 
            height: 60px; display: flex; justify-content: space-between; align-items: center; 
            padding: 0 10px; background: #1a1a2e; border-bottom: 2px solid #333; z-index: 100;
        }

        /* 游戏区域：确保单词不会被隐藏 */
        #stage { 
            flex: 1; position: relative; width: 100%; 
            background: #05050a; overflow: visible; /* 允许单词在舞台内可见 */
            z-index: 10;
        }

        /* 单词样式：提升 z-index 确保在最前 */
        .word { 
            position: absolute; 
            background: rgba(20, 20, 40, 0.95); 
            border: 2px solid var(--primary); 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 22px; 
            font-weight: bold; 
            white-space: nowrap;
            z-index: 50; /* 核心：确保单词在所有背景之上 */
            transform: translateZ(0); /* 开启 GPU 加速防止渲染闪烁 */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .typed { color: #555; }
        .next { color: var(--accent); text-decoration: underline; }
        .wait { color: #f9ed69; }

        /* 键盘 */
        #kb { 
            height: 190px; width: 100%; background: #111; 
            display: none; flex-direction: column; padding: 5px; gap: 5px; 
            border-top: 2px solid var(--primary); z-index: 100;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .kb-row { display: flex; justify-content: center; gap: 4px; flex: 1; }
        .key { 
            flex: 1; background: #30305a; border-radius: 6px; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 18px; font-weight: bold; border-bottom: 3px solid #000;
        }

        .mode-box { display: flex; background: #000; border: 1.5px solid var(--primary); border-radius: 20px; overflow: hidden; }
        .m-btn { padding: 5px 10px; font-size: 11px; border: none; color: #888; background: none; }
        .m-btn.active { background: var(--primary); color: #000; font-weight: bold; }

        #mask { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .btn-start { padding: 15px 50px; background: var(--primary); color: #000; border: none; border-radius: 12px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-size: 16px;">分:<span id="score-display">0</span> ❤️:<span id="lives-display">3</span></div>
        <div class="mode-box">
            <button id="use-voice" class="m-btn active">语音模式</button>
            <button id="use-manual" class="m-btn">手动键盘</button>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size: 20px;">🔄</button>
    </div>

    <div id="stage"></div>

    <div id="kb"></div>

    <div id="mask">
        <h1 style="color:var(--primary)">单词保卫战</h1>
        <p style="color:#777; margin-bottom: 30px;">点击下方按钮开始</p>
        <button class="btn-start" onclick="startGame()">进入战场</button>
    </div>

    <script>
        let game = { mode: 'voice', score: 0, lives: 3, running: false };
        let activeWords = [], targetWord = null;
        let wordList = [{"en":"apple","zh":"苹果"},{"en":"banana","zh":"香蕉"},{"en":"cat","zh":"小猫"},{"en":"dog","zh":"小狗"}];
        let lastSpawn = 0;

        // 初始化 A-Z 键盘
        function initAZ() {
            const kb = document.getElementById('kb');
            const rows = ["ABCDEFGHIJ", "KLMNOPQRST", "UVWXYZ"];
            kb.innerHTML = '';
            rows.forEach(chars => {
                const row = document.createElement('div');
                row.className = 'kb-row';
                chars.split('').forEach(c => {
                    const k = document.createElement('div');
                    k.className = 'key';
                    k.textContent = c;
                    k.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(c.toLowerCase()); });
                    k.addEventListener('mousedown', (e) => { handleInput(c.toLowerCase()); });
                    row.appendChild(k);
                });
                kb.appendChild(row);
            });
        }

        function switchMode(m) {
            game.mode = m;
            document.getElementById('use-voice').classList.toggle('active', m === 'voice');
            document.getElementById('use-manual').classList.toggle('active', m === 'manual');
            document.getElementById('kb').style.display = (m === 'manual') ? 'flex' : 'none';
            // 清理舞台
            document.getElementById('stage').innerHTML = '';
            activeWords = [];
            targetWord = null;
        }

        function startGame() {
            document.getElementById('mask').style.display = 'none';
            game.running = true;
            game.score = 0;
            game.lives = 3;
            updateStats();
            requestAnimationFrame(loop);
        }

        function handleInput(char) {
            if (!game.running || !char) return;
            // 查找匹配的单词
            if (!targetWord) {
                targetWord = activeWords.filter(w => w.text[w.idx] === char).sort((a,b) => b.y - a.y)[0];
            }
            
            if (targetWord && targetWord.text[targetWord.idx] === char) {
                targetWord.idx++;
                renderWordHTML(targetWord);
                if (targetWord.idx === targetWord.text.length) {
                    targetWord.el.remove();
                    activeWords = activeWords.filter(w => w !== targetWord);
                    targetWord = null;
                    game.score += 10;
                    updateStats();
                }
            }
        }

        function spawn() {
            const data = wordList[Math.floor(Math.random()*wordList.length)];
            const el = document.createElement('div');
            el.className = 'word';
            // 随机 X 坐标，确保不超出屏幕
            const x = Math.random() * (window.innerWidth - 120);
            const obj = { el, text: data.en, zh: data.zh, x: x, y: -50, idx: 0 };
            document.getElementById('stage').appendChild(el);
            activeWords.push(obj);
            renderWordHTML(obj);
        }

        function renderWordHTML(w) {
            w.el.style.left = w.x + 'px';
            w.el.style.top = w.y + 'px';
            w.el.innerHTML = `
                <span class="typed">${w.text.slice(0, w.idx)}</span><span class="next">${w.text[w.idx]||''}</span><span class="wait">${w.text.slice(w.idx+1)}</span>
                <div style="font-size:12px; color:var(--primary); text-align:center; font-weight:normal;">${w.zh}</div>
            `;
        }

        function loop(t) {
            if (!game.running) return;

            // 产生速度控制
            if (t - lastSpawn > Math.max(1000, 3000 - game.score * 5)) {
                spawn();
                lastSpawn = t;
            }

            // 移动单词
            for (let i = activeWords.length - 1; i >= 0; i--) {
                const w = activeWords[i];
                w.y += 1 + (game.score * 0.001); // 随分数增加速度
                w.el.style.top = w.y + 'px';

                // 碰撞检测（到达舞台底部）
                if (w.y > document.getElementById('stage').offsetHeight) {
                    w.el.remove();
                    activeWords.splice(i, 1);
                    if (targetWord === w) targetWord = null;
                    game.lives--;
                    updateStats();
                    if (game.lives <= 0) {
                        game.running = false;
                        alert("挑战结束！得分: " + game.score);
                        location.reload();
                    }
                }
            }
            requestAnimationFrame(loop);
        }

        function updateStats() {
            document.getElementById('score-display').textContent = game.score;
            document.getElementById('lives-display').textContent = "❤️".repeat(Math.max(0, game.lives));
        }

        window.onload = () => {
            initAZ();
            document.getElementById('use-voice').onclick = () => switchMode('voice');
            document.getElementById('use-manual').onclick = () => switchMode('manual');
        };
    </script>
</body>
</html>
